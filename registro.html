<html lang="es">

        <link rel="apple-touch-icon" sizes="57x57" href="assets/img/favicon/apple-icon-57x57.png">

        <link rel="icon" type="image/png" sizes="16x16" href="assets/img/favicon/favicon-16x16.png">

        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap" rel="stylesheet">
    </head>
    <body class="">
        <header class="header">
                <nav class="navbar main-menu">
                    <div class="header_title_menu">
                        <a href="index.html" id="logo-icon">
                            <img class="logo-icon" src="/assets/img/logo-concertly.jpg" alt="Inicio">
                        </a>
                        <h1 class="main-title h1 logo">Concertly</h1>
                    </div>

                    <label for="menu_hamburguesa" class="label_menu_hamburguesa">
                        
                    <span class="menu-icon" id="menu-icon">
                            <img src="/assets/img/menu-icon-white.svg" alt="Menú">
                        </span></label>
                    <input type="checkbox" name="" id="menu_hamburguesa" class="menu_hamburguesa">

                    <ul class="nav-list">
                        <li class="list-item nav-list-item">
                            <label for="idioma" class="label  sr-only">Idioma</label>
                            <select name="idioma" id="idioma" class="select select-idioma">
                                <option class="option select-option" value="castellano">Castellano</option>
                                <option class="option select-option" value="euskera">Euskera</option>
                                <option class="option select-option" value="english">English</option>
                            </select>
                        </li>
                    </ul>
                </nav>
        </header>
        
            <main>
                <section class="container registro">
                    <header class="registro-header">
                        <h2>Registro en Concertly</h2>
                        <div class="form-group btn-list">
                            <a class="btn btn-secondary" href="index.html" target="_blank" aria-label="Volver al Inicio">← Volver al Inicio</a>
                            <div class="btn-list">
                                <span>¿Ya tienes cuenta?</span>
                                <a class="" href="index.html" target="_blank" aria-label="Iniciar sesión">Iniciar sesión</a>/div&gt;
                            </div>
                        </div>
                    </header>

                    <section class="card">   
                        <form action="#" method="post" class="form-registro">
                        <fieldset class="form-group grid-container">
                            <legend class="legend">Datos personales</legend>

                            <div class="form-group">
                            <label for="nombre" class="label">Nombre</label>
                            <input type="text" id="nombre" name="nombre" class="input" required="" placeholder="Nombre">
                            </div>

                            <div class="form-group">
                            <label for="apellidos" class="label">Apellidos</label>
                            <input type="text" id="apellidos" name="apellidos" class="input" required="" placeholder="Apellido1 Apellido2">
                            </div>

                            <div class="form-group">
                            <label for="email" class="label">Correo electrónico</label>
                            <input type="email" id="email" name="email" required="" class="input" placeholder="email@email.com">
                            </div>

                            <div class="form-group">
                            <label for="birthday" class="label">Fecha de nacimiento</label>
                            <input type="date" id="birthday" name="birthday" required class="input">
                            </div>

                            <div class="form-group">
                            <label for="telefono" class="label">Número de teléfono</label>
                            <input type="tel" id="telefono" name="telefono" class="input" placeholder="XXX-XXX-XXX">
                            </div>

                            <div class="form-group">
                            <label for="ciudad" class="label">Ciudad</label>
                            <input type="text" id="ciudad" name="ciudad" class="input" placeholder="Introduce tu ciudad">
                            </div>

                            <div class="form-group">
                            <label for="pais" class="label">País</label>
                            <input type="text" id="pais" name="pais" class="input" placeholder="Introduce tu país">
                            </div>

                            <div class="form-group">
                            <label for="codigo-postal" class="label">Código postal</label>
                            <input type="text" id="codigo-postal" name="codigo_postal" class="input" placeholder="XXXXX">
                            </div>

                            <div class="container-input">
                                <label class="label" for="genero">Género</label>
                                <select class="select input" id="genero" name="genero" required>
                                <option value="" disabled selected>Selecciona una opción</option>
                                <option value="mujer">Mujer</option>
                                <option value="hombre">Hombre</option>
                                <option value="no_binario">No binario</option>
                                <option value="prefiero_no_decirlo">Prefiero no decirlo</option>
                                </select>
                            </div>

                            <div class="container-input">
                                <label class="label" for="pronombres">Pronombres</label>
                                <select class="select input" id="pronombres" name="pronombres" multiple="" required>
                                <option value="" disabled selected>Ctrl + clic para escoger varias</option>
                                <option value="mujer">Ella</option>
                                <option value="hombre">Él</option>
                                <option value="no_binario">Elle</option>
                                </select>
                            </div>
                        </fieldset>

                        <fieldset class="form-group grid-container">
                            <legend class="legend">Géneros musicales y artistas favoritos</legend>
                                <div class="container-input">
                                    <label for="category-select" class="label">Géneros musicales:</label>
                                    <select id="category-select" name="genre[]" multiple="" class="select" size="5">
                                        <option value="" disabled selected>Puedes seleccionar varias opciones pulsando CTRL + Click</option>
                                        <option class="option" value="pop">Pop</option>
                                        <option class="option" value="rock">Rock</option>
                                        <option class="option" value="metal">Metal</option>
                                        <option class="option" value="urbano">Urbano</option>
                                        <option class="option" value="electronica">Electrónica</option>
                                    </select>
                                </div>
                                <div class="container-input">
                                    <label for="artistas" class="label">Artistas favoritos</label>
                                    <input type="text" id="artistas" name="artistas" class="input" placeholder="Introduce tus artistas favorito">
                                </div>
                        </fieldset>
                        <div class="form-group btn-list">
                            <a href="index.html" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-primary btn-submit">Registrarme</button>
                        </div>
                    </form>
                </section> 
            </section>
        </main>
    </body>
</html>
